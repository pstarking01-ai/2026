<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>성균관공인중개사사무소 박성균 대표</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=Nanum+Myeongjo:wght@700;800&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; font-family: 'Noto Sans KR', sans-serif; background-color: #f4f2ed; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { width: 350px; background: #fff; border-radius: 20px; box-shadow: 0 15px 40px rgba(0,0,0,0.15); overflow: hidden; border: 1px solid #dcd1b3; }
        
        /* [수정] 사진 크기 대폭 확대 및 컷팅 방지 */
        .photo-area { padding-top: 40px; text-align: center; }
        .photo-area img { width: 150px; height: 150px; border-radius: 50%; object-fit: cover; border: 4px solid #cc6c2c; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        
        .content { padding: 25px; text-align: center; }
        
        /* [수정] 상호 풀네임 및 서체 강조 */
        .biz-name { font-family: 'Nanum Myeongjo', serif; font-size: 22px; color: #3d2b1f; margin-bottom: 8px; font-weight: 800; letter-spacing: -1px; }
        
        .name-row { margin-bottom: 15px; }
        .name { font-family: 'Nanum Myeongjo', serif; font-size: 28px; color: #222; font-weight: 800; }
        .title { font-size: 15px; color: #666; margin-top: 5px; font-weight: 500; }
        
        /* [수정] 메인 타겟 지역 변경 및 슬로건 */
        .slogan { font-size: 15px; color: #cc6c2c; font-weight: 700; margin: 15px 0; line-height: 1.6; }
        
        .contact-list { text-align: left; font-size: 14px; color: #444; border-top: 1px solid #eee; padding-top: 20px; margin-bottom: 25px; }
        .contact-item { margin-bottom: 10px; display: flex; }
        .label { font-weight: 700; color: #cc6c2c; width: 65px; flex-shrink: 0; }
        
        .btn { display: block; background: #cc6c2c; color: #fff; text-decoration: none; padding: 16px; border-radius: 12px; font-weight: 700; font-size: 18px; box-shadow: 0 5px 15px rgba(204, 108, 44, 0.4); transition: 0.3s; }
        .btn:active { background: #a85a24; transform: scale(0.98); }
        
        .bank-info { font-size: 12px; color: #888; margin-top: 20px; background: #f9f9f9; padding: 10px; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="card">
        <div class="photo-area">
            <img src="photo.jpg" alt="박성균 대표">
        </div>
        <div class="content">
            <div class="biz-name">성균관공인중개사사무소</div>
            <div class="name-row">
                <div class="name">박성균 대표</div>
                <div class="title">공인중개사 / 권리분석사</div>
            </div>
            
            <div class="slogan">원주 무실동 부동산의 기준<br>진심을 다하는 데이터 기반 권리분석</div>
            
            <div class="contact-list">
                <div class="contact-item"><span class="label">휴대폰</span> 010-8686-6100</div>
                <div class="contact-item"><span class="label">이메일</span> pstarking@naver.com</div>
                <div class="contact-item"><span class="label">주소</span> 강원도 원주시 무실동 만대로 119</div>
            </div>
            
            <a href="tel:010-8686-6100" class="btn">📞 상담 전화 바로 연결</a>
            
            <div class="bank-info">
                입금계좌: 농협 312-0209-5399-71 (박성균)
            </div>
        </div>
    </div>
</body>
</html>
