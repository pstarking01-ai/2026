<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>성균관공인중개사 박성균 대표</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=Nanum+Myeongjo:wght@700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; font-family: 'Noto Sans KR', sans-serif; background-color: #f6f5f1; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { width: 340px; background: #fff; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.12); overflow: hidden; text-align: center; border: 1px solid #e0d9c0; }
        
        /* [수정] 원형 사진 크기 축소 (80px), 여백 추가 */
        .photo-area { padding-top: 30px; }
        .photo-area img { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border: 3px solid #eee; }
        
        .content { padding: 20px 25px 30px 25px; text-align: center; }
        
        /* [수정] 성균관 이름에 명조계열 고급 폰트 적용 + [수정] 딥 브라운 색상 */
        .biz-name { font-family: 'Nanum Myeongjo', serif; font-size: 26px; color: #4b3d32; font-weight: 700; margin: 0 0 12px 0; }
        
        /* [수정] 박성균 이름은 명조로, 직함은 일반으로 + [수정] 이름은 딥 브라운 */
        .name { font-family: 'Nanum Myeongjo', serif; font-size: 22px; color: #4b3d32; font-weight: 700; display: inline-block; margin-right: 5px; }
        .title { font-size: 14px; color: #666; font-weight: 400; }
        
        /* [수정] 슬로건 색상을 '딥 번트 오렌지'로 변경 */
        .slogan { font-size: 14px; color: #cc6c2c; font-weight: 500; margin: 8px 0 20px 0; letter-spacing: -0.5px; }
        
        .contact-info { text-align: left; font-size: 13px; color: #555; line-height: 1.8; margin-bottom: 25px; border-top: 1px solid #eee; border-bottom: 1px solid #eee; padding: 15px 0; }
        .contact-info span { font-weight: 500; color: #4b3d32; display: inline-block; width: 60px; }
        
        /* [수정] 버튼을 '딥 번트 오렌지'로 변경, 촌스런 주황색 탈피 */
        .btn { display: flex; align-items: center; justify-content: center; padding: 15px; text-decoration: none; border-radius: 12px; font-weight: 700; font-size: 16px; background: #cc6c2c; color: #fff; transition: 0.3s; box-shadow: 0 4px 10px rgba(204, 108, 44, 0.3); }
        .btn svg { margin-right: 8px; width: 18px; height: 18px; fill: white; }
        .btn:active { background: #b05e25; transform: translateY(1px); }
        
        .footer { font-size: 11px; color: #aaa; margin-top: 25px; }
    </style>
</head>
<body>
    <div class="card">
        <div class="photo-area">
            <img src="photo.jpg" alt="박성균 대표">
        </div>
        <div class="content">
            <h1 class="biz-name">성균관</h1>
            <div>
                <span class="name">박성균</span>
                <span class="title">대표 / 권리분석사</span>
            </div>
            <p class="slogan">원주 토지투자 및 기업도시 전문 · 데이터 기반 중개</p>
            
            <div class="contact-info">
                <div><span>사무실</span> 033-735-8701</div>
                <div><span>휴대폰</span> 010-8686-6100</div>
                <div><span>이메일</span> pstarking@naver.com</div>
                <div><span>위치</span> 강원도 원주시 무실동 만대로 119</div>
            </div>
            
            <a href="tel:010-8686-6100" class="btn">
                <svg viewBox="0 0 24 24"><path d="M6.62,10.79C8.06,13.62 10.38,15.94 13.21,17.38L15.41,15.18C15.69,14.9 16.08,14.82 16.43,14.93C17.55,15.3 18.75,15.5 20,15.5A1,1 0 0,1 21,16.5V20A1,1 0 0,1 20,21A17,17 0 0,1 3,4A1,1 0 0,1 4,3H7.5A1,1 0 0,1 8.5,4C8.5,5.25 8.7,6.45 9.07,7.57C9.18,7.92 9.1,8.31 8.82,8.59L6.62,10.79Z"/></svg>
                전화 바로 연결하기
            </a>
            
            <div class="footer">계좌번호: 농협 312-0209-5399-71 (박성균)</div>
        </div>
    </div>
</body>
</html>
