<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>성균관공인중개사 박성균 대표</title>
    <style>
        body { margin: 0; font-family: 'Noto Sans KR', sans-serif; background-color: #f4f4f4; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .card { width: 350px; background: #fff; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow: hidden; text-align: center; }
        .photo-section { background: #eee; height: 200px; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        .photo-section img { width: 100%; height: 100%; object-fit: cover; }
        .info-section { padding: 30px; }
        h1 { margin: 0; font-size: 24px; color: #333; }
        p { color: #666; margin: 10px 0; }
        .contact-btn { display: inline-block; padding: 12px 24px; background: #2ecc71; color: #fff; text-decoration: none; border-radius: 50px; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="card">
        <div class="photo-section">
            <img src="photo.jpg" alt="박성균 대표님 사진">
        </div>
        <div class="info-section">
            <h1>성균관공인중개사</h1>
            <p><strong>박성균 대표</strong></p>
            <p>강원도 원주시 지정면</p>
            <a href="tel:010-XXXX-XXXX" class="contact-btn">전화 문의하기</a>
        </div>
    </div>
</body>
</html>
