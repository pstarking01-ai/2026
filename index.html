    <style>

        body { background-color: #f2f2f2; margin: 0; padding: 15px; display: flex; justify-content: center; font-family: 'Pretendard', sans-serif; }
        .card { background: white; border-radius: 30px; padding: 30px 15px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.05); width: 100%; max-width: 360px; }
        .profile-img { width: 140px; height: 140px; border-radius: 50%; object-fit: cover; margin-bottom: 15px; border: 4px solid white; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }

        .phone-text { font-size: 30px; color: #FF6B00; font-weight: 800; margin-bottom: 25px; text-decoration: none; display: block; }
        .btn-container { display: flex; flex-direction: column; gap: 12px; }
        .btn { display: flex; align-items: center; justify-content: center; text-decoration: none; border-radius: 15px; font-weight: 800; transition: 0.2s; }
        .btn-call { background: #FF9E5E; color: white; font-size: 35px; height: 85px; }
        .btn-call i { font-size: 30px; margin-right: 12px; }
        .sub-group { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .btn-sub { flex-direction: column; height: 105px; font-size: 24px; background: white; color: #333; border: 2px solid #FFB380; }
        .btn-sub i { font-size: 32px; margin-bottom: 8px; color: #FF6B00; }
        .map-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-map { height: 75px; font-size: 28px; background: white; color: #333; border: 2px solid #FFB380; }
        .btn-map i { font-size: 24px; margin-right: 8px; }
        .address-info { font-size: 13px; color: #888; margin-top: 20px; line-height: 1.5; }
    </style>
</head>
