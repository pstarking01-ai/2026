<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>성균관 공인중개사 모바일 명함</title>
    <style>
        body { font-family: 'Apple SD Gothic Neo', sans-serif; text-align: center; background-color: #f4f4f4; margin: 0; padding: 20px; }
        .card { background: white; max-width: 350px; margin: auto; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); padding: 30px; }
        .photo { width: 120px; height: 120px; border-radius: 50%; background: #ddd; margin: auto; overflow: hidden; }
        .photo img { width: 100%; height: 100%; object-fit: cover; }
        h1 { font-size: 24px; color: #333; margin: 20px 0 5px; }
        p { color: #666; font-size: 16px; margin: 5px 0; }
        .contact { margin-top: 25px; }
        .btn { display: block; background: #007bff; color: white; text-decoration: none; padding: 12px; border-radius: 8px; margin-bottom: 10px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <div class="photo">
            <img src="photo.jpg" alt="프로필 사진">
        </div>
        <h1>박성균 대표</h1>
        <p>성균관 공인중개사 사무소</p>
        <p>원주시 만대로 119 (무실동)</p>
        <div class="contact">
            <a href="tel:010-XXXX-XXXX" class="btn">전화 걸기</a>
            <a href="sms:010-XXXX-XXXX" class="btn">문자 보내기</a>
        </div>
    </div>
</body>
</html>
