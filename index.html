<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background:#f2f2f2; display:flex; justify-content:center; padding:20px; font-family:sans-serif; }
        .card { background:#fff; width:340px; border-radius:20px; padding:30px 10px; text-align:center; box-shadow:0 10px 20px rgba(0,0,0,0.1); }
        /* 얼굴 크기 강제 고정 - 이 수치가 120이면 절대 클 수 없습니다 */
        .profile-img { width:120px !important; height:120px !important; border-radius:50%; object-fit:cover; margin-bottom:15px; }
        .name { font-size:40px; font-weight:bold; margin:10px 0; }
        .phone { font-size:30px; color:#ff6b00; font-weight:bold; text-decoration:none; display:block; margin-bottom:20px; }
        .btn { display:block; background:#ff8c32; color:#fff; padding:20px; border-radius:10px; text-decoration:none; font-size:25px; font-weight:bold; margin-bottom:10px; }
        .map-box { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
        .btn-map { background:#fff; color:#333; border:1px solid #ccc; padding:15px; border-radius:10px; text-decoration:none; font-size:18px; }
    </style>
</head>
<body>
    <div class="card">
        <img src="photo.jpg" class="profile-img">
        <div style="font-size:18px; color:#888;">성균관 공인중개사</div>
        <div class="name">박성균 대표</div>
        <a href="tel:01086866100" class="phone">010-8686-6100</a>
        <a href="tel:01086866100" class="btn">전화 상담하기</a>
        <div class="map-box">
            <a href="https://m.map.naver.com/search2/search.naver?query=원주성균관공인중개사사무소" class="btn-map">네이버 지도</a>
            <a href="https://m.map.kakao.com/actions/searchView?q=원주시+만대로+119" class="btn-map">카카오 맵</a>
        </div>
    </div>
</body>
</html>
