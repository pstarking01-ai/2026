    <style>

        body { background-color: #f2f2f2; margin: 0; padding: 20px; display: flex; justify-content: center; font-family: 'Pretendard', sans-serif; }
        .card { background: white; border-radius: 30px; padding: 40px 20px; text-align: center; box-shadow: 0 15px 35px rgba(0,0,0,0.05); width: 100%; max-width: 360px; border: 1px solid #e0d8cc; }

        .btn-container { display: flex; flex-direction: column; gap: 15px; }
        .btn { display: flex; align-items: center; justify-content: center; text-decoration: none; border-radius: 15px; font-weight: 800; transition: 0.2s; }
        
        .btn-call { background: #FF9E5E; color: white; font-size: 40px; height: 70px; border: 3px solid rgba(255,255,255,0.3); }
        .sub-group { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .btn-sub { flex-direction: column; height: 100px; font-size: 30px; background: white; color: #333; border: 2px solid #FFB380; }
        
        /* 전문 아이콘 스타일 */

</head>
