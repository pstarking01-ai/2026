<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>성균관공인중개사 박성균 대표</title>
    <style>
        body { margin: 0; font-family: 'Noto Sans KR', sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { width: 340px; background: #fff; border-radius: 24px; box-shadow: 0 15px 35px rgba(0,0,0,0.15); overflow: hidden; text-align: center; border: 1px solid #eee; }
        .photo-area { width: 100%; height: 280px; background: #fff; overflow: hidden; }
        .photo-area img { width: 100%; height: 100%; object-fit: cover; }
        .content { padding: 25px 20px; }
        .biz-name { font-size: 14px; color: #1a73e8; font-weight: 700; margin-bottom: 5px; letter-spacing: -0.5px; }
        .name { font-size: 24px; color: #222; margin: 0; font-weight: 700; }
        .location { font-size: 15px; color: #666; margin: 12px 0 20px 0; line-height: 1.5; }
        .btn-group { display: flex; flex-direction: column; gap: 10px; }
        .btn { display: block; padding: 15px; text-decoration: none; border-radius: 12px; font-weight: 600; font-size: 16px; transition: 0.3s; }
        .btn-call { background: #1a73e8; color: #fff; } /* 신뢰의 파란색 */
        .btn-call:active { background: #1557b0; }
        .footer { font-size: 12px; color: #aaa; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="card">
        <div class="photo-area">
            <img src="photo.jpg" alt="박성균 대표">
        </div>
        <div class="content">
            <div class="biz-name">원주 토지투자 분석전문가 · 성균관공인중개사</div>
            <h1 class="name">박성균 대표</h1>
            <p class="location">강원도 원주시 무실동<br>진심을 다하는 데이터 기반 중개</p>
            
            <div class="btn-group">
                <a href="tel:010-8686-6100" class="btn btn-call">📞 전화 바로 연결하기</a>
            </div>
            <div class="footer">© 2026 성균관공인중개사사무소</div>
        </div>
    </div>
</body>
</html>
